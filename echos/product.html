<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #333;
      background: #fff;
    }

    a { text-decoration: none; color: inherit; }

    .main-nav {
      display: flex;
      align-items: center;
      padding: 0 28px;
      height: 96px;
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
    }

    .logo img {
      height: 90px;
      width: auto;
      display: block;
    }

    .main-nav-links {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
      justify-content: flex-end;
    }

    .main-nav-links a {
      padding: 6px 12px;
      font-size: 13.5px;
      color: #333;
    }

    .nav-donation {
      background: transparent;
      color: #333 !important;
      border-radius: 4px;
      padding: 6px 12px;
    }

    .cat-nav {
  display: flex;
  justify-content: center;
  height: 44px;
  align-items: center;
  background: #d85b6a; /* pink */
  border-bottom: none;
  gap: 28px;
}

.cat-nav a {
  font-size: 13.5px;
  color: white;
}

.cat-nav a:hover {
  opacity: 0.8;
}

    .product-page {
      max-width: 1050px;
      margin: 55px auto;
      padding: 0 25px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 55px;
      align-items: center;
    }

    .product-left {
      text-align: center;
    }

    .product-left h1 {
      font-size: 30px;
      margin-bottom: 25px;
      color: #111;
    }

    .product-left img {
      width: 100%;
      max-width: 430px;
      object-fit: contain;
    }

    .product-right {
      text-align: left;
    }

    .product-price {
      color: #c0392b;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 22px;
    }

    .product-description {
      font-size: 15px;
      line-height: 1.7;
      color: #444;
      margin-bottom: 28px;
    }

    .add-btn {
      background: #c0392b;
      color: white;
      border: none;
      padding: 12px 34px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 4px;
    }

    .back-btn {
    margin-bottom: 15px;
    background: transparent;
    border: 1px solid #ccc;
    padding: 8px 18px;
    cursor: pointer;
    font-size: 13px;
    border-radius: 4px;
    }

    .back-btn:hover {
    background: #f5f5f5;
    }

    .product-page-wrapper {
    max-width: 1050px;
    margin: 55px auto;
    padding: 0 25px;
    }

    .product-page {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 55px;
    align-items: center;
    }

    /* force back button left */
    .back-btn {
    display: block;
    margin-bottom: 25px;
    }

    @media (max-width: 750px) {
      .product-page {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .product-right {
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <nav class="main-nav">
  <a href="homepage.html" class="logo">
    <img src="logo.png" alt="Garden of Echoes">
  </a>

  <div class="main-nav-links">

    <!-- 1. Garden Program -->
    <a href="subscriptions.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <span>The Garden Program</span>
    </a>

    <!-- 2. About Us -->
    <a href="about.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span>About Us</span>
    </a>

    <!-- 3. Contact -->
    <a href="contact.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 
        19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 
        19.79 19.79 0 0 1 1.61 3.4 
        2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72 
        c.127.96.361 1.903.7 2.81 
        a2 2 0 0 1-.45 2.11L7.91 9 
        a16 16 0 0 0 6 6l1.27-1.27 
        a2 2 0 0 1 2.11-.45 
        c.907.339 1.85.573 2.81.7 
        A2 2 0 0 1 22 16.92z"/>
      </svg>
      <span>Contact Us</span>
    </a>

    <!-- 4. Donation -->
    <a href="donation.html" class="nav-donation">
      <span>Donation</span>
    </a>

    <!-- 5. Cart -->
    <a href="cart.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      <span>Cart</span>
    </a>

    <!-- 6. My Account -->
    <a href="#" onclick="goToAccount(event)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>My Account</span>
    </a>

  </div>
</nav>

  <nav class="cat-nav">
    <a href="flowers.html?filter=Anniversary">Anniversary</a>
    <a href="flowers.html?filter=Birthday">Occasions</a>
    <a href="flowers.html?filter=Sympathy">Sympathy</a>
    <a href="flowers.html">Flowers</a>
  </nav>

  <main class="product-page-wrapper">

  <!-- BACK BUTTON HERE -->
  <button onclick="goBack()" class="back-btn">← Back</button>

  <div class="product-page">
    <div class="product-left">
      <h1 id="name"></h1>
      <img id="image" alt="">
    </div>

    <div class="product-right">
      <div class="product-price" id="price"></div>
      <p class="product-description" id="description"></p>
      <button class="add-btn" onclick="addToCart()">Add to Cart</button>
    </div>
  </div>

</main>

  <script>
    const product = JSON.parse(localStorage.getItem('selectedProduct'));

    if (product) {
      document.getElementById('name').innerText = product.name;
      document.getElementById('image').src = product.image;
      document.getElementById('image').alt = product.name;
      document.getElementById('price').innerText = "$" + product.price;
      document.getElementById('description').innerText = product.description || '';
    }
  </script>
  <script>
    function goBack() {
    window.history.back();
    }
</script>
<script>
    async function addToCart() {
  const userEmail = localStorage.getItem('email');

  if (!userEmail) {
    alert('Please log in before adding items to your cart.');
    window.location.href = 'login.html';
    return;
  }

  const product = JSON.parse(localStorage.getItem('selectedProduct'));

  const data = {
    userEmail: userEmail,
    productName: product.name,
    productPrice: product.price,
    productImage: product.image
  };

  try {
    const res = await fetch('/cart', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if (res.ok) {
      alert('Added to cart!');
    } else {
      alert(result.error || 'Error adding to cart');
    }

  } catch (err) {
    console.error(err);
    alert('Something went wrong.');
  }
}
</script>

</body>
</html>
